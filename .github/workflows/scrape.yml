name: Sync Car Listings

on:
  schedule:
    # Every 15 minutes, offset off the :00/:15/:30/:45 peak slots that GitHub drops under load
    - cron: "8,23,38,53 * * * *"
  workflow_dispatch:

# If a run is already going (e.g. cron-job.org and the app button fire close
# together), don't start a second overlapping sync — let the in-flight one finish.
concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Sync DB schema (also generates client)
        run: npx prisma db push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run sync
        run: npm run sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SCRAPPINGBEE_KEY: ${{ secrets.SCRAPPINGBEE_KEY }}
          # Optional — only needed if you enabled Expo's enhanced push security.
          EXPO_ACCESS_TOKEN: ${{ secrets.EXPO_ACCESS_TOKEN }}
