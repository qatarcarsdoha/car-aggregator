name: Sync Car Listings

on:
  schedule:
    # Every 15 minutes, offset off the :00/:15/:30/:45 peak slots that GitHub drops under load
    - cron: "8,23,38,53 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npx prisma generate

      - name: Run sync
        run: npm run sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
