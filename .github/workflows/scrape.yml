name: Sync Car Listings

on:
  # Triggered on demand only — via workflow_dispatch. The reliable hourly
  # heartbeat now comes from cron-job.org hitting /api/sync (the app's "Sync now"
  # button hits the same route). GitHub's own `schedule:` trigger was removed
  # because it fired hours late under load; that's the whole reason for the switch.
  workflow_dispatch:

# If a run is already going (e.g. cron-job.org and the app button fire close
# together), don't start a second overlapping sync — let the in-flight one finish.
concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      # Generate the Prisma client only — NO `prisma db push` here. `generate`
      # reads the schema locally and never connects to the DB, so it can't fail
      # on Neon's cold start. Schema changes are pushed manually on deploy (see
      # CLAUDE.md "Deploying"), not on every sync.
      - name: Generate Prisma client
        run: npx prisma generate

      # Retry the sync to absorb Neon cold starts. On the hourly cadence the DB
      # auto-suspends between runs, so the first connection can lose the race
      # against Neon's wake (P1001). A failed attempt fails fast at connect time,
      # before any scraping work, so retrying is cheap — by attempt 2 the endpoint
      # is awake. 3 tries, 15s apart.
      - name: Run sync (retry for Neon cold starts)
        run: |
          for attempt in 1 2 3; do
            echo "::group::Sync attempt $attempt"
            if npm run sync; then
              echo "::endgroup::"
              echo "Sync succeeded on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt failed — waiting 15s for Neon to wake…"
            sleep 15
          done
          echo "All 3 sync attempts failed"
          exit 1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SCRAPPINGBEE_KEY: ${{ secrets.SCRAPPINGBEE_KEY }}
          # Optional — only needed if you enabled Expo's enhanced push security.
          EXPO_ACCESS_TOKEN: ${{ secrets.EXPO_ACCESS_TOKEN }}
